name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

jobs:
  build-deb:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential qtbase5-dev libqt5serialport5-dev dpkg-dev

      - name: Build and package
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel $(nproc)
          cd build && cpack -G DEB

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: build/*.deb

  build-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:40
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y cmake gcc-c++ make qt6-qtbase-devel qt6-qtserialport-devel rpm-build

      - name: Build and package
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel $(nproc)
          cd build && cpack -G RPM

      - name: Upload .rpm
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: build/*.rpm

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.*'
          arch: 'win64_msvc2019_64'
          modules: 'qtserialport'
          cache: true

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Package
        run: cd build && cpack -G NSIS -C Release

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/*.exe

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-deb, build-rpm, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            debian-package/*.deb
            rpm-package/*.rpm
            windows-installer/*.exe
          generate_release_notes: true
